<!DOCTYPE html>
<html>
<head>
    <title>Spicy Chicken Pickle Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff5f0;
            text-align: center;
        }

        header {
            background-color: darkred;
            color: white;
            padding: 20px;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
            flex-wrap: wrap;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            background-color: darkred;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: red;
        }

        .cart {
            background: #ffe0d6;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🔥 Spicy Chicken Pickle Store 🔥</h1>
    <p>Homemade | Fresh | Hygienic</p>
</header>

<section class="products">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1604908177522-432d1e5d2c6e" alt="Classic Chicken Pickle">
        <h2>Classic Chicken Pickle</h2>
        <p>Rs. 500</p>
        <button onclick="addToCart('Classic Chicken Pickle', 500)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1625944193683-5b7e9b0ffc3c" alt="Spicy Chicken Pickle">
        <h2>Extra Spicy Chicken Pickle</h2>
        <p>Rs. 650</p>
        <button onclick="addToCart('Extra Spicy Chicken Pickle', 650)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1598514982846-1f5cce5c4a32" alt="Garlic Chicken Pickle">
        <h2>Garlic Chicken Pickle</h2>
        <p>Rs. 600</p>
        <button onclick="addToCart('Garlic Chicken Pickle', 600)">Add to Cart</button>
    </div>

</section>

<section class="cart">
    <h2>🛒 Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: Rs. <span id="total">0</span></h3>
    <button onclick="confirmOrder()">Confirm Order</button>
</section>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        total += price;
        updateCart();
    }

    function updateCart() {
        let cartItems = document.getElementById("cart-items");
        cartItems.innerHTML = "";

        cart.forEach(item => {
            let li = document.createElement("li");
            li.textContent = item.name + " - Rs. " + item.price;
            cartItems.appendChild(li);
        });

        document.getElementById("total").textContent = total;
    }

    function confirmOrder() {
        if(cart.length === 0){
            alert("Your cart is empty!");
            return;
        }

        alert("Order Confirmed! We will contact you soon.");
        cart = [];
        total = 0;
        updateCart();
    }
</script>

</body>
</html>
